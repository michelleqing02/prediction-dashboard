bundle:
  name: wnba-trading-workstation

sync:
  exclude:
    - .git/**
    - .tmp_agents/**
    - agents/**
    - .databricks/**
    - "*.log"
    - "*.pdf"
    - "*.jpg"
    - "*.png"
    - "*.webp"
    - "*.gif"
    - "*.svg"
    - "Michelle Trading Sheet 2026 updated.xlsx"
    - "Michelle Trading Sheet copy.xlsx"
    - "espn_*"
    - "fav_*"
    - "statmuse_*"
    - "wnba_2025_pre_vs_regular_games.csv"
    - "updated_2026_team_ratings.csv"
    - "backend/server.run.log"
    - "frontend.run.err.log"
    - "frontend.run.log"
    - "start-dashboard.*"

resources:
  apps:
    wnba_trading_workstation:
      name: wnba-trading-workstation
      source_code_path: .
      description: WNBA team pricing, matchup, and results tracking workstation
      permissions:
        - user_name: michelle.qing@fanduel.com
          level: CAN_MANAGE
        - group_name: users
          level: CAN_USE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fdg-analytics.cloud.databricks.com
      root_path: /Workspace/Users/michelle.qing@fanduel.com/.bundle/${bundle.name}/${bundle.target}
